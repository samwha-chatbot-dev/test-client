<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼화페인트 챗봇 로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }
        .login-title {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .form-label {
            font-weight: 500;
            color: #555;
            margin-bottom: 8px;
        }
        .form-control {
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 10px 15px;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            margin-top: 20px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .kb-domains-list {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            min-height: 50px;
        }
        .kb-domain-item {
            display: inline-block;
            background: white;
            padding: 5px 12px;
            margin: 5px;
            border-radius: 20px;
            font-size: 0.9em;
            border: 1px solid #ddd;
        }
        .alert {
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2 class="login-title">삼화페인트 챗봇 로그인</h2>
        
        {% if error %}
        <div class="alert alert-danger" role="alert">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="/login">
            <div class="mb-3">
                <label for="corp_id" class="form-label">법인 코드</label>
                <input type="text" class="form-control" id="corp_id" name="corp_id" 
                       value="SH001" required>
            </div>
            
            <div class="mb-3">
                <label for="employee_id" class="form-label">사번</label>
                <input type="text" class="form-control" id="employee_id" name="employee_id" 
                       value="hong123" required>
            </div>
            
            <div class="mb-3">
                <label for="user_name" class="form-label">이름</label>
                <input type="text" class="form-control" id="user_name" name="user_name" 
                       value="홍길동" required>
            </div>
            
            <div class="mb-3">
                <label for="department" class="form-label">부서</label>
                <input type="text" class="form-control" id="department" name="department" 
                       value="인사팀" required>
            </div>
            
            <div class="mb-3">
                <label for="group_code" class="form-label">Group Code</label>
                <select class="form-control" id="group_code" name="group_code" required>
                    <option value="">선택하세요</option>
                    {% if group_codes %}
                        {% for group_code in group_codes %}
                        <option value="{{ group_code.code }}" 
                                data-kb-domains="{% if group_code.kb_domains %}{% if group_code.kb_domains is iterable and group_code.kb_domains is not string %}{{ group_code.kb_domains | join(',') }}{% else %}{{ group_code.kb_domains }}{% endif %}{% endif %}">
                            {{ group_code.code }} - {{ group_code.description or '' }}
                        </option>
                        {% endfor %}
                    {% else %}
                        <option value="" disabled>Group Code를 불러올 수 없습니다</option>
                    {% endif %}
                </select>
                {% if not group_codes and error %}
                <small class="text-danger">{{ error }}</small>
                {% endif %}
            </div>
            
            <div class="mb-3">
                <label class="form-label">KB Domains</label>
                <div class="kb-domains-list" id="kb-domains-display">
                    <span class="text-muted">Group Code를 선택하세요</span>
                </div>
            </div>
            
            <button type="submit" class="btn btn-login">로그인</button>
        </form>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // KB Domains 데이터 (서버에서 전달받은 전체 KB Domain 목록)
        const kbDomainsMap = {};
        {% for kb_domain in kb_domains %}
        kbDomainsMap['{{ kb_domain.code }}'] = {
            code: '{{ kb_domain.code }}',
            name: '{{ kb_domain.name or kb_domain.code }}'
        };
        {% endfor %}
        
        // Group Code 선택 시 KB Domains 표시
        document.getElementById('group_code').addEventListener('change', function() {
            const selectedOption = this.options[this.selectedIndex];
            const kbDomainsStr = selectedOption.getAttribute('data-kb-domains') || '';
            const kbDomainsDisplay = document.getElementById('kb-domains-display');
            
            if (!kbDomainsStr) {
                kbDomainsDisplay.innerHTML = '<span class="text-muted">KB Domains가 없습니다</span>';
                return;
            }
            
            // 콤마로 구분된 KB Domain 코드들을 파싱
            const kbDomainCodes = kbDomainsStr.split(',').map(code => code.trim()).filter(code => code);
            
            if (kbDomainCodes.length === 0) {
                kbDomainsDisplay.innerHTML = '<span class="text-muted">KB Domains가 없습니다</span>';
                return;
            }
            
            // KB Domain 정보 표시
            kbDomainsDisplay.innerHTML = kbDomainCodes.map(code => {
                const kbDomain = kbDomainsMap[code];
                const displayName = kbDomain ? `${kbDomain.code} (${kbDomain.name})` : code;
                return `<span class="kb-domain-item">${displayName}</span>`;
            }).join('');
        });
    </script>
</body>
</html>
